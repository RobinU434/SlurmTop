[build-system]
requires = ["maturin>=1.7,<2.0"]
build-backend = "maturin"

[project]
name = "slurmtop"
version = "0.1.0"
description = "Terminal UI for Slurm job monitoring (Rust-powered)."
readme = "README.md"
requires-python = ">=3.9"
authors = [
    { name = "Robin", email = "root@example.com" },
]
keywords = ["slurm", "tui", "term", "rust"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: System Administrators",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Rust",
    "Programming Language :: Python :: 3",
]

[project.scripts]
slurmtop = "slurmtop:main"

[tool.maturin]
bindings = "pyo3"
python-source = "python"
module-name = "slurmtop._slurmtop"
features = ["python"]
strip = true
